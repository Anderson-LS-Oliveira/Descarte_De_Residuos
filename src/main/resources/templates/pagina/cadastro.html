<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICONES -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>

        :root{
        --verde:#66AA6E;
        --cinza:#F2F2F2;
        --preto:#151515;
        }

        body{
        background:var(--cinza);
        font-family:Arial, Helvetica, sans-serif;
        padding-top:60px;
        }

        /* BARRA SUPERIOR */

        .topbar{
        background:var(--preto);
        height:50px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:0 20px;
        color:white;

        position:fixed;
        top:0;
        left:0;
        width:100%;
        z-index:1100;
        }

        .topbar a{
        color:white;
        text-decoration:none;
        font-weight:bold;
        }

        /* MENU LATERAL */

        .sidebar{
        position:fixed;
        left:-250px;
        top:0;
        width:250px;
        height:100%;
        background:var(--preto);
        color:white;
        padding:20px;
        transition:0.3s;
        z-index:1200;
        }

        .sidebar a{
        display:block;
        color:white;
        text-decoration:none;
        margin:10px 0;
        }

        .sidebar h5{
        color:var(--verde);
        margin-top:20px;
        }

        /* CADASTRO */

        .cadastro-container{
        background:white;
        padding:30px;
        border-radius:8px;
        box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }

        .btn-verde{
        background:var(--verde);
        color:white;
        border:none;
        }

        .btn-verde:hover{
        background:#5a9961;
        }

        /* FOOTER */

        footer{
        background:var(--preto);
        color:white;
        text-align:center;
        padding:25px;
        margin-top:60px;
        }

        footer i{
        font-size:22px;
        cursor:pointer;
        }

    </style>

</head>

<body>

<!-- MENU LATERAL -->

<div id="sidebar" class="sidebar">

    <h5>Ações</h5>

    <a th:href="@{/registrar_denuncia}">Registrar denúncia</a>
    <a th:href="@{/solicitar_coleta}">Solicitar coleta</a>
    <a th:href="@{/pontos_coleta}">Pontos de coleta</a>
    <a th:href="@{/instrucoes}">Instruções de descarte</a>

    <h5>Minhas atividades</h5>

    <a th:href="@{/minhas_denuncias}">Minhas denúncias</a>
    <a th:href="@{/minhas_solicitacoes}">Minhas solicitações de coleta</a>

    <h5>Conta</h5>

    <a th:href="@{/login}">Login</a>
    <a th:href="@{/cadastro}">Cadastro</a>

</div>

<!-- BARRA SUPERIOR -->

<div class="topbar">

    <div>
        <i class="bi bi-list fs-3" style="cursor:pointer" onclick="toggleMenu()"></i>
    </div>

    <div>
        <a th:href="@{/}"></i> Voltar ao menu</a>
    </div>

</div>

<!-- FORM CADASTRO -->

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="cadastro-container">

                <h3 class="text-center mb-4">Criar Conta</h3>

                <form action="/cadastro" method="post">

                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control" name="nome" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" class="form-control" name="senha" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Telefone</label>
                        <input type="text" class="form-control" name="telefone" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Data de nascimento</label>
                        <input type="date" class="form-control" name="dataNascimento" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-verde">
                            <i class="bi bi-person-plus"></i> Cadastrar
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->

<footer>

    <p>Fale conosco</p>

    <i class="bi bi-whatsapp me-3"></i>
    <i class="bi bi-facebook me-3"></i>
    <i class="bi bi-linkedin"></i>

</footer>

<script>

    const sidebar = document.getElementById("sidebar");

    function toggleMenu(){

    if(sidebar.style.left === "0px"){
    sidebar.style.left = "-250px";
    }else{
    sidebar.style.left = "0px";
    }

    }

    document.addEventListener("click", function(event){

    const menuIcon = document.querySelector(".bi-list");

    if(!sidebar.contains(event.target) && !menuIcon.contains(event.target)){
    sidebar.style.left = "-250px";
    }

    });

</script>

</body>
</html>
